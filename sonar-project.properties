# ⚠️ VERIFY THESE TWO against SonarCloud → project → Information (top-right ⋮).
# The defaults follow SonarCloud's GitHub-import convention (<Org>_<repo> / org slug),
# but a wrong value fails the scan with "Project not found".
sonar.projectKey=Disble_dlinter-ts-react
sonar.organization=disble

# What Sonar treats as production code vs. tests.
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts

# Keep tests and fixtures out of the "sources" measurement, but still analyzed as tests.
sonar.exclusions=**/*.test.ts,**/__fixtures__/**,dist/**
sonar.coverage.exclusions=**/__tests__/**,**/*.test.ts,**/__fixtures__/**

# Coverage report produced by `bun run test:coverage`.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
